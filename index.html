<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .subtitle { font-size: 1.1rem; opacity: 0.9; }
        .stats { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(10px); }

        .search-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        .search-input-wrapper { display: flex; gap: 15px; margin-bottom: 15px; }
        .search-input {
            flex: 1;
            padding: 15px 25px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .lang-toggle {
            display: flex;
            background: #f5f5f5;
            border-radius: 30px;
            overflow: hidden;
        }
        .lang-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-label { font-size: 13px; color: #666; margin-right: 5px; }
        .filter-tag {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .filter-tag:hover, .filter-tag.active {
            background: #667eea;
            color: white;
        }

        .sort-options {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        .sort-btn {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .sort-btn:hover, .sort-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .categories-nav {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .categories-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .category-card {
            padding: 12px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .category-card.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .category-name { font-weight: 600; font-size: 13px; }
        .category-count { font-size: 11px; opacity: 0.7; margin-top: 5px; }

        .results-info { color: white; margin-bottom: 15px; font-size: 14px; }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .keyword-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .keyword-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: all 0.3s;
        }
        .keyword-card.heat-5::before { background: linear-gradient(90deg, #ff416c, #ff4b2b); }
        .keyword-card.heat-4::before { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .keyword-card.heat-3::before { background: linear-gradient(90deg, #667eea, #764ba2); }
        .keyword-card.heat-2::before { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .keyword-card.heat-1::before { background: linear-gradient(90deg, #a8edea, #fed6e3); }

        .keyword-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .keyword-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            position: relative;
        }
        .keyword-title-group {
            flex: 1;
        }
        .keyword-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .keyword-title { font-size: 20px; font-weight: 700; color: #333; }
        .keyword-title-en { font-size: 13px; color: #666; margin-top: 4px; }
        .heat-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .heat-5 .heat-badge { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .heat-4 .heat-badge { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .heat-3 .heat-badge { background: linear-gradient(135deg, #667eea, #764ba2); }
        .heat-2 .heat-badge { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .heat-1 .heat-badge { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #666; }

        .keyword-section { margin-bottom: 10px; }
        .section-title {
            font-size: 11px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .word-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .word-tag {
            padding: 3px 10px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 11px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }
        .word-tag:hover {
            background: #667eea;
            color: white;
        }

        .platform-links { display: flex; gap: 6px; margin-top: 12px; }
        .platform-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            color: white;
        }
        .platform-1688 { background: #ff6a00; }
        .platform-alibaba { background: #ff6b00; }
        .platform-mic { background: #e74c3c; }
        .platform-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .keyword-note {
            margin-top: 10px;
            padding: 8px;
            background: #fff8e1;
            border-radius: 6px;
            font-size: 11px;
            color: #666;
            border-left: 3px solid #ffa726;
        }

        .random-idea-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .random-idea-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102,126,234,0.5);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .empty-state-title { font-size: 1.5rem; margin-bottom: 10px; }
        .empty-state-desc { font-size: 1rem; opacity: 0.8; }

        .legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 12px;
            color: rgba(255,255,255,0.9);
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .heat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .heat-dot-5 { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .heat-dot-4 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .heat-dot-3 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .heat-dot-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .heat-dot-1 { background: linear-gradient(135deg, #a8edea, #fed6e3); }

        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 360px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 { text-align: center; color: #333; margin-bottom: 25px; font-size: 1.5rem; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .login-box input:focus { border-color: #667eea; }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box button:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .login-box .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
        }
        .login-error { color: #e74c3c; font-size: 13px; text-align: center; margin-bottom: 10px; display: none; }

        .purchase-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .search-input-wrapper { flex-direction: column; }
            .results-grid { grid-template-columns: 1fr; }
            .categories-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .lang-toggle { border-radius: 10px; }
            .keyword-card { padding: 16px; }
            h1 { font-size: 1.8rem; }
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .lucky-draw-section {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .lucky-draw-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .lucky-draw-btn {
            padding: 14px 32px;
            background: white;
            color: #e74c3c;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .lucky-draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }
        .lucky-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .lucky-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            text-align: left;
        }
        .lucky-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f6d365, #fda085);
        }
        .lucky-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .lucky-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .lucky-card-en {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }
        .lucky-card-variant, .lucky-card-attr, .lucky-card-scene {
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .lucky-card-variant strong, .lucky-card-attr strong, .lucky-card-scene strong {
            color: #fda085;
        }
        .lucky-card-links {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }
        .lucky-card-links a {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            color: white;
        }
        .lucky-card-links a:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        .lucky-card-links a:nth-child(1) { background: #ff6a00; }
        .lucky-card-links a:nth-child(2) { background: #ff6b00; }
        .lucky-card-links a:nth-child(3) { background: #e74c3c; }
        .quote-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .quote-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .quote-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .quote-text {
            font-size: 1rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .quote-author {
            font-size: 0.8rem;
            color: #999;
        }
        @media (max-width: 1200px) {
            .lucky-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .lucky-cards {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            let results = allKeywords;

            // 鍝佺被绛涢€?            if (currentCategory !== 'all') {
                results = results.filter(kw => kw.categoryId === currentCategory);

            // 鐑害绛涢€?- 绮剧‘鍖归厤锛堥伩鍏?楂樼儹搴?涔熸樉绀?瓒呴珮鐑害"锛?            if (currentFilter !== 'all' && currentFilter !== 'purchase') {
                const heatLevel = parseInt(currentFilter);
                results = results.filter(kw => kw.h === heatLevel);
            }

            // 鍏抽敭璇嶆悳绱?            if (query) {
                results = results.filter(kw => {
                    const vwZh = (kw.vw?.zh || []).join(' ');
                    const vwEn = (kw.vw?.en || []).join(' ');
                    const searchText = ((kw.pw?.zh || '') + ' ' + (kw.pw?.en || '') + ' ' + vwZh + ' ' + vwEn).toLowerCase();
                    return searchText.includes(query);
                });
            }

            // 鎺掑簭
            if (currentSort === 'heat') {
                results.sort((a, b) => b.h - a.h);
            } else {
                results.sort((a, b) => a.pw.zh.localeCompare(b.pw.zh, 'zh'));
            }

            renderKeywords(results);
        }

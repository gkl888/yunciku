                <div class="sort-options">
                    <span class="filter-label">排序:</span>
                    <button class="sort-btn active" data-sort="heat">热度优先</button>
                    <button class="sort-btn" data-sort="name">名称排序</button>
                    
                </div>
            </div>
        </div>

        <div class="lucky-draw-section">
            <div class="lucky-draw-title">🎰 不知道找什么?让老天来决定!</div>
            <button class="lucky-draw-btn" onclick="luckyDraw()">🎲 帮我抽3个关键词</button>
            <div class="lucky-cards" id="luckyCards"></div>
        </div>

        <div class="categories-nav">
            <div class="categories-title"><span>🎯</span> 类目导航 · 点击浏览</div>
            <div class="categories-grid" id="categoriesGrid"></div>
        </div>

        <div class="results-info" id="resultsInfo"></div>
        <div class="purchase-panel" id="purchasePanel" style="display:none; background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 style="color:#333; margin:0;">📦 近一年采购记录 (<span id="purchaseTotal">0</span> 个产品)</h2>
                <button onclick="togglePurchasePanel(false)" style="background:#f5576c; color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; font-size:13px;">✕ 关闭</button>
            </div>
            <div class="purchase-categories" id="purchaseCategories" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;"></div>
            <div class="purchase-search" style="margin-bottom:20px;">
                <input type="text" id="purchaseSearchInput" placeholder="🔍 搜索采购产品..." oninput="renderPurchaseProducts(currentPurchaseCat)" style="width:100%; padding:12px 20px; border:2px solid #e0e0e0; border-radius:25px; font-size:14px; outline:none;">
            </div>
            <div class="purchase-grid" id="purchaseGrid"></div>
        </div>
        
        <div class="results-grid" id="resultsGrid"></div>
    </div>

    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
        // 登录检查
        const CURRENT_USER_KEY = 'procurement_current_user';
        (function checkAuth() {
            const currentUser = localStorage.getItem(CURRENT_USER_KEY);
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const user = JSON.parse(currentUser);
                if (user.expires && new Date().getTime() > user.expires) {
                    localStorage.removeItem(CURRENT_USER_KEY);
                    window.location.href = 'login.html';
                    return;
                }
            } catch(e) {
                window.location.href = 'login.html';
            }
        })();

        function logout() {
            localStorage.removeItem(CURRENT_USER_KEY);
            localStorage.removeItem('procurement_remember');
            window.location.href = 'login.html';
        }

        function escHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        // 异步加载 DATA（优化首屏加载速度）
        let DATA = null;
        let currentLang = 'zh';
        let currentFilter = 'all';
        let currentSort = 'heat';
        let currentCategory = 'all';
        let allKeywords = [];

        function flattenKeywords() {
            const flat = [];
            DATA.categories.forEach(cat => {
                cat.subcategories.forEach(sub => {
                    sub.keywords.forEach(kw => {
                        // 兼容两种字段名格式：缩写(pw/vw/aw/sw) 和 完整(product_word/variant_words/attribute_words/scene_words)
                        const normalizedKw = {
                            ...kw,
                            // 如果没有缩写字段，使用完整字段名
                            pw: kw.pw || kw.product_word,
                            vw: kw.vw || kw.variant_words,
                            aw: kw.aw || kw.attribute_words,
                            sw: kw.sw || kw.scene_words,
                            category: cat.name,
                            categoryId: cat.id,
                            subcategory: sub.name
                        };
                        flat.push(normalizedKw);
                    });
                });
            });
            return flat;
        }

        // 数据加载状态
        let dataLoaded = false;
        let loadPromise = null;
        
        // 从 data.json 加载数据（带缓存）
        async function loadDataFromJson() {
            if (loadPromise) return loadPromise;
            
            loadPromise = new Promise(async (resolve) => {
                console.log('[Init] 开始加载数据...');
                
                // 先检查 localStorage
                const saved = localStorage.getItem('keyword_database_v2');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.categories && parsed.categories.length > 0) {
                            DATA = parsed;
                            dataLoaded = true;
                            console.log('[Init] 从缓存加载，关键词数:', countKeywords(DATA));
                            resolve();
                            return;
                        }
                    } catch(e) {
                        console.warn('[Init] 缓存解析失败:', e);
                    }
                }
                
                // 从 data.json 加载
                try {
                    console.log('[Init] 从 data.json 加载...');
                    const res = await fetch('./data.json?v=20260627-1600');
                    if (!res.ok) {
                        throw new Error('HTTP ' + res.status);
                    }
                    DATA = await res.json();
                    dataLoaded = true;
                    // 缓存到 localStorage
                    localStorage.setItem('keyword_database_v2', JSON.stringify(DATA));
                    console.log('[Init] 从 data.json 加载成功，关键词数:', countKeywords(DATA));
                } catch(e) {
                    console.error('[Init] 数据加载失败:', e);
                    // 显示错误信息
                    document.querySelector('.loading-spinner p').textContent = '加载失败，请刷新重试';
                }
                resolve();
            });
            
            return loadPromise;
        }
        
        function countKeywords(data) {
            if (!data || !data.categories) return 0;
            return data.categories.reduce((sum, cat) => {
                return sum + cat.subcategories.reduce((s, sub) => s + sub.keywords.length, 0);
            }, 0);
        }

        // 等待数据加载完成
        (async function init() {
            await loadDataFromJson();
            if (!DATA) {
                console.error('[Init] 数据加载失败');
                return;
            }
            allKeywords = flattenKeywords();
            
            // 更新统计
            document.getElementById('statCats').textContent = DATA.categories.length;
            document.getElementById('statSubs').textContent = DATA.categories.reduce((s,c) => s + c.subcategories.length, 0);
            document.getElementById('statKws').textContent = allKeywords.length;
            
            // 渲染
            renderCategories();
            performSearch();
            
            // 隐藏加载遮罩
            document.getElementById('loadingOverlay').classList.add('hidden');
            
            console.log('[Init] 初始化完成，关键词数:', allKeywords.length);
        })();

        // 渲染类目导航
        function renderCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid || !DATA || !DATA.categories) return;
            
            grid.innerHTML = DATA.categories.map(cat => `
                <div class="category-card" onclick="filterByCategory('${cat.id}')">
                    <div class="category-name">${escHtml(cat.name.zh)}</div>
                    <div class="category-count">${cat.subcategories.reduce((sum, s) => sum + s.keywords.length, 0)} 个词</div>
                </div>
            `).join('');
        }
        
        // 按类目筛选
        function filterByCategory(catId) {
            currentCategory = catId;
            const cat = DATA.categories.find(c => c.id === catId);
            if (cat) {
                document.getElementById('searchInput').value = '';
                const catKeywords = allKeywords.filter(k => k.categoryId === catId);
                renderKeywords(catKeywords);
                document.getElementById('resultsInfo').textContent = `📂 ${escHtml(cat.name.zh)} - 共 ${catKeywords.length} 个关键词`;
                window.scrollTo({ top: document.querySelector('.search-box').offsetTop - 20, behavior: 'smooth' });
            }
        }
        
        // BroadcastChannel 实时同步
        
function checkLocalSync() {
            const saved = localStorage.getItem('keyword_database_v2');
            if (!saved) return;
            try {
                const parsed = JSON.parse(saved);
                // 验证数据格式：检查第一个关键词是否有必要字段（支持两种格式）
                let isValidFormat = false;
                if (parsed.categories && parsed.categories.length > 0) {
                    const firstCat = parsed.categories[0];
                    // 同时检查 category.name 是否有 zh 字段
                    if (firstCat.name && firstCat.name.zh && firstCat.subcategories && firstCat.subcategories.length > 0) {
                        const firstSub = firstCat.subcategories[0];
                        if (firstSub.name && firstSub.name.zh && firstSub.keywords && firstSub.keywords.length > 0) {
                            const firstKw = firstSub.keywords[0];
                            // 支持两种字段名格式
                            const hasPw = firstKw && (firstKw.pw !== undefined || firstKw.product_word !== undefined);
                            const hasVw = firstKw && (firstKw.vw !== undefined || firstKw.variant_words !== undefined);
                            isValidFormat = hasPw && hasVw;
                        }
                    }
                }
                // 移除30分钟缓存过期限制，数据持久保存
                if (parsed.categories && isValidFormat) {
                    DATA = parsed;
                    allKeywords = flattenKeywords();
                    document.getElementById('statCats').textContent = DATA.categories.length;
                    document.getElementById('statSubs').textContent = DATA.categories.reduce((s,c) => s + c.subcategories.length, 0);
                    document.getElementById('statKws').textContent = allKeywords.length;
                    renderCategories();
                    performSearch();
                    console.log('[Sync] 已从本地存储同步数据，关键词数:', allKeywords.length);
                } else if (parsed.categories && !isValidFormat) {
                    console.log('[Sync] 本地数据格式已过期，已清除并使用内置数据');
                    // 清除旧的localStorage数据
                    localStorage.removeItem('keyword_database_v2');
                }
            } catch(e) {
                // 详细错误信息
                console.warn('[Sync] localStorage 数据解析失败，已清除并使用内嵌数据。错误:', e.message);
                localStorage.removeItem('keyword_database_v2');
            }
        }
        const syncChannel = new BroadcastChannel('procurement_sync');
        syncChannel.onmessage = (e) => {
            if (e.data && e.data.type === 'data_updated') {
                checkLocalSync();
            }
        };
        checkLocalSync();

        function getHeatLabel(heat) {
            const labels = ['', '', '\u4e00\u822c', '\u4e2d', '\u9ad8', '\u8d85\u9ad8'];
            const icons = ['', '', '\ud83d\udcc9', '\ud83d\udcca', '\u26a1', '\ud83d\udd25'];
            return icons[heat] + ' ' + labels[heat];
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function escJs(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
        }

        // 虚拟滚动优化
        let currentKeywords = [];
        let renderedCount = 0;
        const INITIAL_RENDER_COUNT = 30;  // 初始渲染30个
        const BATCH_RENDER_COUNT = 20;    // 每次滚动渲染20个
        let isRendering = false;
        
        function renderKeywords(keywords) {
            const grid = document.getElementById('resultsGrid');
            const info = document.getElementById('resultsInfo');

            if (keywords.length === 0) {
                grid.innerHTML = '<div class="no-results"><h2>🔍 未找到相关关键词</h2><p>尝试换个搜索词或调整筛选条件</p></div>';
                info.textContent = '未找到结果';
                return;
            }

            info.textContent = '找到 ' + keywords.length + ' 个关键词';
            
            // 保存当前关键词列表
            currentKeywords = keywords;
            renderedCount = 0;
            grid.innerHTML = '';
            
            // 移除旧的滚动监听
            window.removeEventListener('scroll', handleScrollRender);
            
            // 初始渲染第一批
            renderKeywordBatch(INITIAL_RENDER_COUNT);
            
            // 如果还有更多，添加滚动监听
            if (keywords.length > INITIAL_RENDER_COUNT) {
                window.addEventListener('scroll', handleScrollRender, { passive: true });
            }
        }
        
        function handleScrollRender() {
            if (isRendering || renderedCount >= currentKeywords.length) return;
            
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const windowHeight = window.innerHeight;
            const docHeight = document.documentElement.scrollHeight;
            
            // 距离底部300px时加载更多
            if (scrollTop + windowHeight >= docHeight - 300) {
                isRendering = true;
                requestAnimationFrame(() => {
                    renderKeywordBatch(renderedCount + BATCH_RENDER_COUNT);
                    isRendering = false;
                });
            }
        }
        
        function renderKeywordBatch(endIndex) {
            const grid = document.getElementById('resultsGrid');
            const end = Math.min(endIndex, currentKeywords.length);
            
            // 使用 DocumentFragment 批量插入
            const fragment = document.createDocumentFragment();
            
            for (let i = renderedCount; i < end; i++) {
                const kw = currentKeywords[i];
                const words = currentLang === 'en' ? (kw.vw?.en || []) : (kw.vw?.zh || []);
                const attrs = currentLang === 'en' ? (kw.aw?.en || []) : (kw.aw?.zh || []);
                const scenes = currentLang === 'en' ? (kw.sw?.en || []) : (kw.sw?.zh || []);

                const cardDiv = document.createElement('div');
                cardDiv.className = 'keyword-card heat-' + kw.h;
                cardDiv.innerHTML =
                    '<div class="keyword-header">' +
                        '<div class="keyword-title-group">' +
                            '<div class="keyword-title">' + escHtml(kw.pw?.zh || '') + '</div>' +
                            '<div class="keyword-title-en">' + escHtml(kw.pw?.en || '') + '</div>' +
                        '</div>' +
                        '<div class="keyword-actions">' +
                            '<button class="copy-btn" onclick="copyKeyword(\'' + escJs(kw.pw?.zh || '') + '\', \'' + escJs(kw.pw?.en || '') + '\')">📋 复制</button>' +
                            '<span class="heat-badge">' + getHeatLabel(kw.h) + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="keyword-section">' +
                        '<div class="section-title">🏷️ 品类</div>' +
                        '<div class="word-tags">' +
                            '<span class="word-tag">' + escHtml(kw.category?.zh || '') + '</span>' +
                            '<span class="word-tag">' + escHtml(kw.subcategory?.zh || '') + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="keyword-section">' +
                        '<div class="section-title">🔄 变体词</div>' +
                        '<div class="word-tags">' +
                            words.slice(0, 4).map(w => '<span class="word-tag" onclick="copyText(\'' + escJs(w) + '\')">' + escHtml(w) + '</span>').join('') +
                        '</div>' +
                    '</div>' +
                    '<div class="keyword-section">' +
                        '<div class="section-title">⚙️ 属性词</div>' +
                        '<div class="word-tags">' +
                            attrs.slice(0, 3).map(w => '<span class="word-tag" onclick="copyText(\'' + escJs(w) + '\')">' + escHtml(w) + '</span>').join('') +
                        '</div>' +
                    '</div>' +
                    '<div class="keyword-section">' +
                        '<div class="section-title">🎯 场景词</div>' +
                        '<div class="word-tags">' +
                            scenes.slice(0, 3).map(w => '<span class="word-tag" onclick="copyText(\'' + escJs(w) + '\')">' + escHtml(w) + '</span>').join('') +
                        '</div>' +
                    '</div>' +
                    ((kw.notes && !kw.notes.includes('来自一刻相册')) ? '<div class="keyword-note">💡 ' + escHtml(kw.notes) + '</div>' : '') +
                    '<div class="platform-links">' +
                        '<a href="https://s.1688.com/selloffer/offer_search.htm?keywords=' + (kw.pw_gbk || '') + '" target="_blank" class="platform-btn platform-1688">1688</a>' +
                        '<a href="https://www.alibaba.com/trade/search?SearchText=' + encodeURIComponent(kw.pw?.en || '') + '" target="_blank" class="platform-btn platform-alibaba">Alibaba</a>' +
                        '<a href="https://www.made-in-china.com/products-search/hot-china-products/' + (kw.pw?.en || '').replace(/ /g, '_') + '.html" target="_blank" class="platform-btn platform-mic">Made-in-China</a>' +
                    '</div>';
                fragment.appendChild(cardDiv);
            }
            
            grid.appendChild(fragment);
            renderedCount = end;
            
            // 显示加载进度（仅当还有更多内容时显示）
            if (renderedCount < currentKeywords.length) {
                const info = document.getElementById('resultsInfo');
                info.textContent = '找到 ' + currentKeywords.length + ' 个关键词';
            }
        }

        let purchaseData = null;
        let currentPurchaseCat = 'all';
        let purchaseDataLoaded = false;

        async function loadPurchaseData() {
            if (purchaseDataLoaded && purchaseData) {
                // 数据已加载，直接显示
                renderPurchaseCategories();
                renderPurchaseProducts('all');
                return;
            }
            
            // 显示加载中
            document.getElementById('purchaseGrid').innerHTML = '<div style="color:#667eea; text-align:center; padding:40px;"><div class="loading-spinner"></div><p>正在加载采购数据...</p></div>';
            
            try {
                const res = await fetch('purchase_history.json?_t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                purchaseData = await res.json();
                purchaseDataLoaded = true;
                document.getElementById('purchaseTotal').textContent = purchaseData.total || 0;
                renderPurchaseCategories();
                renderPurchaseProducts('all');
            } catch (e) {
                console.error('采购数据加载失败:', e);
                document.getElementById('purchaseGrid').innerHTML = '<div style="color:#999; text-align:center; padding:40px;">⚠️ 采购数据加载失败,请检查 purchase_history.json 是否可访问</div>';
            }
        }

        function renderPurchaseCategories() {
            if (!purchaseData) return;
            const cats = purchaseData.categories || [];
            const total = purchaseData.total || 0;
            const container = document.getElementById('purchaseCategories');
            let html = '<button class="filter-tag active" data-pcat="all" onclick="renderPurchaseProducts(\'all\', this)">全部 (' + total + ')</button>';
            cats.forEach(cat => {
                html += '<button class="filter-tag" data-pcat="' + escHtml(cat.name) + '" onclick="renderPurchaseProducts(\'' + escHtml(cat.name) + '\', this)">' + escHtml(cat.name) + ' (' + cat.count + ')</button>';
            });
            container.innerHTML = html;
        }

        function renderPurchaseProducts(catName, btn) {
            if (!purchaseData) return;
            currentPurchaseCat = catName;
            // 更新分类按钮 active 状态
            if (btn) {
                document.querySelectorAll('#purchaseCategories .filter-tag').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            } else {
                document.querySelectorAll('#purchaseCategories .filter-tag').forEach(t => {
                    t.classList.toggle('active', t.dataset.pcat === catName);
                });
            }
            const searchText = (document.getElementById('purchaseSearchInput').value || '').trim().toLowerCase();
            let products = [];
            if (catName === 'all') {
                (purchaseData.categories || []).forEach(cat => {
                    (cat.products || []).forEach(p => products.push({ ...p, cat: cat.name }));
                });
            } else {
                const cat = (purchaseData.categories || []).find(c => c.name === catName);
                if (cat) products = (cat.products || []).map(p => ({ ...p, cat: cat.name }));
            }
            if (searchText) {
                products = products.filter(p =>
                    (p.name_cn || '').toLowerCase().includes(searchText) ||
                    (p.name_en || '').toLowerCase().includes(searchText)
                );
            }
            const grid = document.getElementById('purchaseGrid');
            if (products.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; padding:40px;">无匹配产品</div>';
                return;
            }
            grid.innerHTML = products.map(p => 
                '<div class="purchase-card" style="background:#fafafa; border-radius:10px; padding:14px; border-left:4px solid #f5576c; transition:all 0.2s;">' +
                '<div style="font-size:14px; font-weight:600; color:#333; margin-bottom:4px;">' + escHtml(p.name_cn) + '</div>' +
                '<div style="font-size:12px; color:#999;">' + escHtml(p.name_en) + '</div>' +
                '<div style="font-size:11px; color:#f5576c; margin-top:6px;">📁 ' + escHtml(p.cat) + '</div>' +
                '</div>'
            ).join('');
        }

        function togglePurchasePanel(show) {
            const panel = document.getElementById('purchasePanel');
            if (show) {
                panel.style.display = 'block';
                // 延迟加载采购数据（首次点击时才加载）
                if (!purchaseDataLoaded) {
                    loadPurchaseData();
                }
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                panel.style.display = 'none';
            }
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            let results = allKeywords;

            // 品类筛选
            if (currentCategory !== 'all') {
                results = results.filter(kw => kw.categoryId === currentCategory);
            }

            // 热度筛选 - 精确匹配（避免"高热度"也显示"超高热度"）
            if (currentFilter !== 'all' && currentFilter !== 'purchase') {
                const heatLevel = parseInt(currentFilter);
                results = results.filter(kw => kw.h === heatLevel);
            }

            // 关键词搜索
            if (query) {
                results = results.filter(kw => {
                    const vwZh = (kw.vw?.zh || []).join(' ');
                    const vwEn = (kw.vw?.en || []).join(' ');
                    const searchText = ((kw.pw?.zh || '') + ' ' + (kw.pw?.en || '') + ' ' + vwZh + ' ' + vwEn).toLowerCase();
                    return searchText.includes(query);
                });
            }

            // 排序
            if (currentSort === 'heat') {
                results.sort((a, b) => b.h - a.h);
            } else {
                results.sort((a, b) => {
                    const aPw = a.pw?.zh || '';
                    const bPw = b.pw?.zh || '';
                    return aPw.localeCompare(bPw, 'zh');
                });
            }

            renderKeywords(results);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('已复制: ' + text));
        }

        function copyKeyword(zh, en) {
            const text = currentLang === 'en' ? en : zh;
            navigator.clipboard.writeText(text).then(() => showToast('已复制: ' + text));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        document.getElementById('searchInput').addEventListener('input', performSearch);

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                performSearch();
            });
        });

        document.querySelectorAll('.filter-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                currentFilter = tag.dataset.filter;
                if (currentFilter === 'purchase') {

        function luckyDraw() {
            const all = allKeywords;
            if (all.length < 3) return;
            const picked = [];
            const used = new Set();
            while (picked.length < 3) {
                const idx = Math.floor(Math.random() * all.length);
                if (!used.has(idx)) { used.add(idx); picked.push(all[idx]); }
            }
            const container = document.getElementById('luckyCards');
            container.innerHTML = '';
            picked.forEach(kw => {
                if (!kw || !kw.pw) return; // 跳过无效关键词
                const card = document.createElement('div');
                card.className = 'lucky-card';
                const vwArr = (kw.vw && kw.vw.zh) ? kw.vw.zh : [];
                const awArr = (kw.aw && kw.aw.zh) ? kw.aw.zh : [];
                const swArr = (kw.sw && kw.sw.zh) ? kw.sw.zh : [];
                const pwZh = kw.pw.zh || '';
                const pwEn = kw.pw.en || '';
                card.innerHTML = `
                    <div class="lucky-card-title">${pwZh}</div>
                    <div class="lucky-card-en">${pwEn}</div>
                    ${vwArr.length ? '<div class="lucky-card-variant"><strong>变体:</strong>' + vwArr.slice(0,3).join('、') + '</div>' : ''}
                    ${awArr.length ? '<div class="lucky-card-attr"><strong>属性:</strong>' + awArr.slice(0,3).join('、') + '</div>' : ''}
                    ${swArr.length ? '<div class="lucky-card-scene"><strong>场景:</strong>' + swArr.slice(0,3).join('、') + '</div>' : ''}
                    <div class="lucky-card-links">
